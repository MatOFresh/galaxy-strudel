<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Studio Galaxie 🚀 — fais ta musique</title>
  <meta name="theme-color" content="#0A0B0E" />
  <meta name="description" content="Fabrique de la musique spatiale avec des boutons, sans coder. Propulsé par Strudel." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/fonts.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <!-- Moteur audio Strudel (UMD -> fonctions globales) -->
  <script src="https://unpkg.com/@strudel/web@1.3.0"></script>
</head>
<body>
  <canvas id="kz-galaxy" class="kz-galaxy"></canvas>

  <!-- ÉCRAN D'ACCUEIL : choix du mode + niveau -->
  <section id="kz-home" class="kz-home">
    <header class="kz-home-head">
      <h1 class="kz-logo">TEUF TECH TAZZ ULTRA</h1>
    </header>

    <div class="kz-level-switch big">
      <span class="kz-level-title">Niveau :</span>
      <button data-level="simple" class="kz-level-btn">😀 Simple</button>
      <button data-level="expert" class="kz-level-btn">🧠 Expert</button>
    </div>

    <p class="kz-choose">Choisis ta façon de jouer :</p>
    <div id="kz-mode-cards" class="kz-mode-cards"></div>
  </section>

  <!-- STUDIO : le mode choisi -->
  <section id="kz-studio" class="kz-studio hidden">
    <header class="kz-topbar">
      <button id="kz-home-btn" class="kz-top-btn" title="Retour">🏠</button>
      <span id="kz-mode-name" class="kz-mode-name">🎛️ Séquenceur</span>
      <button id="kz-viz-btn" class="kz-top-btn kz-viz-launch" title="Visualizer">◉</button>
      <div class="kz-level-switch">
        <button data-level="simple" class="kz-level-btn">😀</button>
        <button data-level="expert" class="kz-level-btn">🧠</button>
      </div>
    </header>

    <div id="kz-mode-root" class="kz-mode-root"></div>

    <footer class="kz-transport">
      <div class="kz-tempo-wrap">
        <input id="kz-tempo" type="range" min="70" max="180" value="110" />
        <span id="kz-tempo-val" class="kz-tempo-val">110 BPM</span>
      </div>
      <button id="kz-master-btn" class="kz-t-icon" title="Master (volume, filtre, limiteur)"></button>
      <button id="kz-sync-btn" class="kz-sync-btn" title="Lancement synchronisé à la mesure">Sync</button>
      <button id="kz-code-btn" class="kz-code-launch" title="Code Window">Code</button>
    </footer>
  </section>

  <!-- Play/Pause flottant : hors des sections pour rester AU-DESSUS de tous les menus -->
  <button id="kz-play" class="kz-play hidden" title="Play / Pause">▶︎</button>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
